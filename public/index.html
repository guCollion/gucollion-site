<script>
    const lines = [
        "欢迎回来，\n这里是孤克恩的\n个人空间",
        "时间会留下痕迹。",
        "把微小的光收藏在这里。",
        "直到世界尽头，我们仍会相遇。"
    ];

    const el = document.getElementById("typingText");

    let lineIndex = 0;
    let charIndex = 0;

    function typeLine() {
        if (!el) return;

        const current = lines[lineIndex];
        el.textContent = current.slice(0, charIndex);
        charIndex++;

        if (charIndex <= current.length) {
            setTimeout(typeLine, 70);
        } else {
            setTimeout(() => {
                charIndex = 0;
                lineIndex = (lineIndex + 1) % lines.length;
                typeLine();
            }, 2600);
        }
    }

    typeLine();

    function renderMonthCalendar() {
        const grid = document.getElementById("calendarGrid");
        const yearEl = document.getElementById("calendarYear");
        const monthEl = document.getElementById("calendarMonth");

        const today = new Date();
        const year = today.getFullYear();
        const month = today.getMonth();

        yearEl.innerText = year;
        monthEl.innerText = String(month + 1).padStart(2, "0");

        const firstDay = new Date(year, month, 1).getDay();
        const days = new Date(year, month + 1, 0).getDate();

        grid.innerHTML = "";

        for (let i = 0; i < firstDay; i++) {
            grid.appendChild(document.createElement("div"));
        }

        for (let day = 1; day <= days; day++) {
            const item = document.createElement("div");
            item.className = "calendar-day";

            if (day === today.getDate()) {
                item.classList.add("today");
            }

            item.innerHTML = `
      <strong>${day}</strong>
      <small></small>
    `;

            grid.appendChild(item);
        }
    }

    renderMonthCalendar();


</script>

<script>
    (function () {
        const musicList = Array.from(document.querySelectorAll(".music-item")).map(item => ({
            title: item.dataset.title,
            artist: item.dataset.artist,
            file: item.dataset.file,
            cover: item.dataset.cover,
            lyric: item.dataset.lyric
        }));

        if (!musicList.length) return;

        let currentMusic = 0;

        let playMode = "order";

        const audioPlayer = document.getElementById("audioPlayer");
        const musicCover = document.getElementById("musicCover");
        const musicTitle = document.getElementById("musicTitle");
        const musicArtist = document.getElementById("musicArtist");
        const playMusic = document.getElementById("playMusic");
        const prevMusic = document.getElementById("prevMusic");
        const nextMusic = document.getElementById("nextMusic");
        const playModeBtn = document.getElementById("playMode");

        const progressBar = document.getElementById("progressBar");
        const currentTime = document.getElementById("currentTime");
        const durationTime = document.getElementById("durationTime");

        const lyricBox = document.getElementById("lyricBox");
        const lyricLines = document.getElementById("lyricLines");
        let currentLyricIndex = -1;

        let lyrics = [];

        function parseLrc(text) {
            return text.split("\n").map(line => {
                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if (!match) return null;

                return {
                    time: Number(match[1]) * 60 + Number(match[2]),
                    text: match[3].trim()
                };
            }).filter(Boolean);
        }

        async function loadLyric(url) {
    currentLyricIndex = -1;

    if (!url) {
        lyrics = [];
        lyricLines.innerHTML = "<p>暂无歌词</p>";
        return;
    }

    const res = await fetch(url);
    const text = await res.text();

    lyrics = parseLrc(text);

    if (!lyrics.length) {
        lyricLines.innerHTML = "<p>暂无歌词</p>";
        return;
    }

    lyricLines.innerHTML = lyrics.map((line, index) => {
        return `<p data-index="${index}">${line.text}</p>`;
    }).join("");
}

        function formatTime(time) {
            if (isNaN(time)) return "0:00";
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60);
            return `${minutes}:${String(seconds).padStart(2, "0")}`;
        }

        function loadMusic(index) {
            const music = musicList[index];

            musicCover.src = music.cover;
            musicTitle.innerText = music.title;
            musicArtist.innerText = music.artist;
            audioPlayer.src = music.file;
            loadLyric(music.lyric);
        }

        function playCurrentMusic() {
            audioPlayer.play();
            playMusic.innerText = "暂停";
            musicCover.classList.add("playing");
        }

        playMusic.addEventListener("click", () => {
            if (audioPlayer.paused) {
                playCurrentMusic();
            } else {
                audioPlayer.pause();
                playMusic.innerText = "播放";
                musicCover.classList.remove("playing");
            }
        });

        prevMusic.addEventListener("click", () => {
            currentMusic = (currentMusic - 1 + musicList.length) % musicList.length;
            loadMusic(currentMusic);
            playCurrentMusic();
            renderMusicList();
        });

        nextMusic.addEventListener("click", () => {
            currentMusic = (currentMusic + 1) % musicList.length;
            loadMusic(currentMusic);
            playCurrentMusic();
            renderMusicList();
        });
        playModeBtn.addEventListener("click", () => {
            if (playMode === "order") {
                playMode = "random";
                playModeBtn.innerText = "随机播放";
            } else if (playMode === "random") {
                playMode = "single";
                playModeBtn.innerText = "单曲循环";
            } else {
                playMode = "order";
                playModeBtn.innerText = "顺序播放";
            }
        });


        audioPlayer.addEventListener("loadedmetadata", () => {
            durationTime.innerText = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener("timeupdate", () => {
            if (!audioPlayer.duration) return;

            progressBar.value = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            currentTime.innerText = formatTime(audioPlayer.currentTime);
            let index = lyrics.findIndex((line, i) => {
                const next = lyrics[i + 1];
                return audioPlayer.currentTime >= line.time &&
                    (!next || audioPlayer.currentTime < next.time);
            });

            if (index !== -1 && index !== currentLyricIndex) {
                currentLyricIndex = index;

                document.querySelectorAll("#lyricLines p").forEach(p => {
                    p.classList.remove("active");
                });

                const activeLine = document.querySelector(`#lyricLines p[data-index="${index}"]`);

                if (activeLine) {
                    activeLine.classList.add("active");
                    activeLine.scrollIntoView({
                        behavior: "smooth",
                        block: "center"
                    });
                }
            }
        });

        progressBar.addEventListener("input", () => {
            if (!audioPlayer.duration) return;

            audioPlayer.currentTime =
                (progressBar.value / 100) * audioPlayer.duration;
        });
        audioPlayer.addEventListener("ended", () => {
            if (playMode === "single") {
                audioPlayer.currentTime = 0;
                playCurrentMusic();
                return;
            }

            if (playMode === "random") {
                currentMusic = Math.floor(Math.random() * musicList.length);
                loadMusic(currentMusic);
                playCurrentMusic();
                renderMusicList();
                return;
            }

            nextMusic.click();
        });

        const musicListBox = document.getElementById("musicList");

        function renderMusicList() {
            musicListBox.innerHTML = "";

            musicList.forEach((music, index) => {
                const item = document.createElement("div");

                item.className = "music-list-item";

                if (index === currentMusic) {
                    item.classList.add("active");
                }

                item.innerHTML = `
            <span>${music.title}</span>
            <small>${music.artist}</small>
        `;

                item.addEventListener("click", () => {
                    currentMusic = index;
                    loadMusic(currentMusic);
                    playCurrentMusic();
                    renderMusicList();
                });

                musicListBox.appendChild(item);
            });
        }

        loadMusic(currentMusic);
        renderMusicList();
    })();
</script>
