{{ define "main" }}

<article class="post-single">

    <header class="post-header">
        <h1 class="post-title">
            {{ .Title }}
        </h1>
    </header>

    <div class="post-content">
        {{ .Content }}
    </div>

    <div class="comments-area">
        {{ partial "comments.html" . }}
    </div>

</article>

{{ end }}
